services:
  nginx:
    image: nginx:alpine
    container_name: orazen-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s
    networks:
      - orazen-network

  postgres:
    image: postgres:16-alpine
    container_name: orazen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orazen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-orazen}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-orazen_user} -d ${POSTGRES_DB:-orazen}",
        ]
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 15s
      start_interval: 5s
    networks:
      - orazen-network

  redis:
    image: redis:7-alpine
    container_name: orazen-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 10s
      start_interval: 5s
    networks:
      - orazen-network

  db-migrate:
    image: postgres:16-alpine
    container_name: orazen-db-migrate
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - ./server/migration:/migrations:ro
    command:
      [
        "sh",
        "-c",
        "if [ \"$(psql -h postgres -U ${POSTGRES_USER:-orazen_user} -d ${POSTGRES_DB:-orazen} -tAc \"SELECT to_regclass('public.verification')\")\" = \"verification\" ]; then echo 'Base schema already present'; else psql -h postgres -U ${POSTGRES_USER:-orazen_user} -d ${POSTGRES_DB:-orazen} -v ON_ERROR_STOP=1 -f /migrations/001_initial_schema.sql; fi && if [ \"$(psql -h postgres -U ${POSTGRES_USER:-orazen_user} -d ${POSTGRES_DB:-orazen} -tAc \"SELECT to_regclass('public.immutable_audit_chain')\")\" = \"immutable_audit_chain\" ]; then echo 'Immutable audit chain schema already present'; else psql -h postgres -U ${POSTGRES_USER:-orazen_user} -d ${POSTGRES_DB:-orazen} -v ON_ERROR_STOP=1 -f /migrations/002_immutable_audit_chain.sql; fi",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orazen-network

  ml-sidecar:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: orazen-ml
    restart: unless-stopped
    environment:
      GRPC_PORT: 50051
      LOG_LEVEL: ${ML_LOG_LEVEL:-INFO}
      LLM_GUARD_DEVICE: cuda
    expose:
      - "50051"
    volumes:
      - ml_cache:/root/.cache
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1',50051),2); s.close()",
        ]
      interval: 5m
      timeout: 10s
      retries: 5
      start_period: 300s
      start_interval: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - orazen-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: orazen-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orazen_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-orazen}
      REDIS_URL: redis://redis:6379
      ML_SIDECAR_URL: http://ml-sidecar:50051
      RUST_LOG: ${RUST_LOG:-orazen_api=info,tower_http=warn}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost,http://frontend:3000,http://nginx}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set for model API key encryption}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ml-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ping || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 5s
    networks:
      - orazen-network

  frontend:
    image: ${BUN_IMAGE:-oven/bun:latest}
    container_name: orazen-frontend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -lc "bun install && bun run dev --hostname 0.0.0.0 --port 3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orazen_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-orazen}
      RUST_API_URL: http://server:8080
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${DEV_BETTER_AUTH_URL:-http://localhost}
      APP_DOMAIN: ${DEV_APP_DOMAIN:-localhost}
      APP_PUBLIC_ORIGIN: ${DEV_APP_PUBLIC_ORIGIN:-http://localhost}
      NEXT_PUBLIC_APP_URL: ${DEV_NEXT_PUBLIC_APP_URL:-http://localhost}
      PASSKEY_ORIGIN: ${DEV_PASSKEY_ORIGIN:-http://localhost}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PASSKEY_RP_ID: ${DEV_PASSKEY_RP_ID:-localhost}
      PASSKEY_RP_NAME: ${PASSKEY_RP_NAME:-orazen}
      ESEWA_SECRET_KEY: ${ESEWA_SECRET_KEY:-}
      ESEWA_PRODUCT_CODE: ${ESEWA_PRODUCT_CODE:-}
      ESEWA_ENVIRONMENT: ${ESEWA_ENVIRONMENT:-sandbox}
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      DEV_DASHBOARD_WARMUP: ${DEV_DASHBOARD_WARMUP:-true}
      WATCHPACK_POLLING: ${DEV_WATCHPACK_POLLING:-false}
    expose:
      - "3000"
    volumes:
      - ./orazen:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
      - frontend_bun_cache:/root/.bun/install/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    networks:
      - orazen-network

volumes:
  postgres_data:
  redis_data:
  ml_cache:
  nginx_logs:
  frontend_node_modules:
  frontend_next:
  frontend_bun_cache:

networks:
  orazen-network:
    name: orazen-network
    driver: bridge
